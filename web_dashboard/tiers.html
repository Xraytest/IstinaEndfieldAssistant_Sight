<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tiers Configuration - Istina Platform</title>
</head>
<body>
    <h1>Tiers Configuration</h1>
    <div id="tiers-container"></div>
    <div id="toast"></div>
    
    <script>
        var tiersConfig = {};
        
        function showToast(message, type) {
            var toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.style.color = type === 'error' ? 'red' : 'green';
        }
        
        function renderTiersConfig() {
            try {
                var container = document.getElementById('tiers-container');
                if (!container || !tiersConfig) return;
                
                if (Object.keys(tiersConfig).length === 0) {
                    container.innerHTML = '<p>No tier configurations found.</p>';
                    return;
                }
                
                container.innerHTML = Object.keys(tiersConfig).map(function(key) {
                    var config = tiersConfig[key];
                    return '<div class="tier-item"><strong>' + key + '</strong>: <span>' + JSON.stringify(config) + '</span></div>';
                }).join('');
            } catch (e) {
                console.error('render error:', e);
            }
        }
        
        async function loadTiersConfig() {
            try {
                var response = await fetch('/api/tiers/config', {
                    method: 'GET',
                    headers: { 'Authorization': 'Bearer default_password' }
                });
                const data = await response.json();
                if (data && data.status === 'success') {
                    tiersConfig = data.tiers || {};
                }
            } catch (parseErr) {
                tiersConfig = {};
                console.error('JSON parse error:', parseErr);
            } catch (error) {
                var errorMsg = error instanceof Error 
                    ? error.message.toString() 
                    : String(error);
                showToast('加载配置错误：' + errorMsg, 'error');
                tiersConfig = {};
            }
            renderTiersConfig();
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadTiersConfig();
        });
    </script>
</body>
</html>
